<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>셀렉상회 상품 목차</title>
  <style>
    :root{--ink:#172033;--muted:#687386;--blue:#356ae6;--soft:#eaf1ff;--line:#dfe5ed;--bg:#f4f7fb;--ok:#12a875}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Pretendard,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif}button,input{font:inherit}button{cursor:pointer}
    .top{display:flex;align-items:center;gap:24px;padding:22px 4vw;background:#fff;border-bottom:1px solid var(--line)}.brandline{color:var(--blue);font-size:10px;font-weight:800;letter-spacing:.14em}.top h1{margin:3px 0 0;font-size:26px;letter-spacing:-.04em}.top p{margin:0;padding-left:24px;border-left:1px solid var(--line);color:var(--muted);font-size:13px}.topnav{display:flex;gap:6px;margin-left:auto}.topnav a{padding:9px 13px;border-radius:8px;color:#627087;font-size:11px;font-weight:750;text-decoration:none}.topnav a.on{background:var(--blue);color:#fff}.topnav a:not(.on):hover{background:var(--soft);color:var(--blue)}
    .cloudbar{display:flex;align-items:center;gap:7px;padding:10px 4vw;border-bottom:1px solid var(--line);background:#f8faff}.cloudbar input{width:190px;height:35px;padding:0 12px;border:1px solid #d5dde7;border-radius:8px;outline:none;font-size:10px}.cloudbar button{height:35px;padding:0 12px;border:1px solid #cad6e8;border-radius:8px;background:#fff;color:#42516a;font-size:10px;font-weight:750}.cloudbar button.primary{border-color:var(--blue);background:var(--blue);color:#fff}.cloud-status{margin-left:auto;color:#718096;font-size:10px}.cloud-status.connected{color:var(--ok);font-weight:750}
    .wrap{width:min(1380px,calc(100% - 40px));margin:22px auto}.intro{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:16px}.intro h2{margin:0;font-size:24px}.intro p{margin:7px 0 0;color:var(--muted);font-size:12px}.new{display:inline-flex;align-items:center;justify-content:center;height:41px;padding:0 16px;border-radius:9px;background:var(--blue);color:#fff;font-size:11px;font-weight:800;text-decoration:none}
    .summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:15px}.summary article{padding:16px 18px;border:1px solid var(--line);border-radius:13px;background:#fff}.summary span{color:var(--muted);font-size:10px}.summary b{display:block;margin-top:5px;font-size:23px}
    .panel{overflow:hidden;border:1px solid var(--line);border-radius:15px;background:#fff;box-shadow:0 10px 30px rgba(23,32,51,.05)}.tools{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid var(--line)}.tabs{display:flex;gap:5px}.tabs button{height:38px;padding:0 13px;border:0;border-radius:8px;background:#eef2f7;color:#697587;font-size:10px;font-weight:800}.tabs button.on{background:var(--blue);color:#fff}.search{position:relative;flex:1}.search input{width:100%;height:40px;padding:0 13px 0 37px;border:1px solid #d6dee8;border-radius:9px;outline:none}.search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(53,106,230,.1)}.search span{position:absolute;left:13px;top:9px;color:var(--blue);font-size:18px}
    .tablewrap{overflow:auto}table{width:100%;border-collapse:collapse;white-space:nowrap}th{padding:11px 13px;background:#f8fafd;color:#778397;font-size:9px;text-align:left}td{padding:12px 13px;border-top:1px solid #edf0f4;font-size:10.5px}.product-name{max-width:360px;overflow:hidden;text-overflow:ellipsis;font-weight:750}.muted{color:#8994a4}.money{font-weight:800;text-align:right}.actions{display:flex;gap:5px}.actions a,.actions button{display:inline-flex;align-items:center;justify-content:center;height:28px;padding:0 9px;border:0;border-radius:7px;background:#edf3ff;color:var(--blue);font-size:9px;font-weight:750;text-decoration:none}.actions button.delete{background:#fff0f0;color:#c33}.empty{padding:60px 20px;text-align:center;color:#8a95a5;font-size:11px}.pager{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;border-top:1px solid var(--line)}.pager button{height:30px;padding:0 10px;border:1px solid var(--line);border-radius:7px;background:#fff;color:#627087;font-size:9px}.pager button:disabled{opacity:.35;cursor:default}.pager span{color:#687386;font-size:10px}.status{padding:9px 14px;border-bottom:1px solid var(--line);background:#fbfcfe;color:#687386;font-size:9px}.hidden{display:none!important}
    @media(max-width:760px){.top{padding:14px 17px;flex-wrap:wrap}.top h1{font-size:20px}.top p{display:none}.topnav{width:100%;margin:0}.topnav a{flex:1;text-align:center}.cloudbar{padding:9px 11px;flex-wrap:wrap}.cloudbar input{width:calc(50% - 4px)}.cloudbar button{flex:1}.cloud-status{width:100%;margin:2px 0 0;text-align:center}.wrap{width:calc(100% - 22px);margin:13px auto}.intro{align-items:start}.intro h2{font-size:20px}.intro p{font-size:10px}.new{height:37px;padding:0 11px}.summary{gap:8px}.summary article{padding:13px}.summary b{font-size:19px}.tools{align-items:stretch;flex-direction:column}.tabs{display:grid;grid-template-columns:1fr 1fr}.search input{height:42px}th,td{padding:10px;font-size:9px}.product-name{max-width:230px}.hide-mobile{display:none}}
  </style>
</head>
<body>
  <header class="top"><div><div class="brandline">SELECT SHOP 343</div><h1>셀렉상회 상품 목차</h1></div><p>저장 상품과 불러온 엑셀 상품을 한곳에서 확인합니다.</p><nav class="topnav"><a href="https://grace-im90.github.io/select-shop-writer/" target="_top">판매글 작성</a><a class="on" href="https://grace-im90.github.io/select-shop-writer/products/" target="_top">상품 목차</a></nav></header>
  <section class="cloudbar">
    <input id="cloudEmail" type="email" placeholder="클라우드 로그인 이메일" autocomplete="email">
    <input id="cloudPassword" type="password" placeholder="비밀번호 6자리 이상" autocomplete="current-password">
    <button id="cloudLogin" class="primary" type="button">로그인</button>
    <button id="cloudSignup" type="button">회원가입</button>
    <button id="cloudLogout" class="hidden" type="button">로그아웃</button>
    <button id="cloudSync" class="hidden" type="button">↻ 지금 동기화</button>
    <span id="cloudStatus" class="cloud-status">클라우드 연결 준비 중…</span>
  </section>
  <main class="wrap">
    <div class="intro"><div><h2>상품 목록</h2><p>상품을 검색하고 작성 화면으로 바로 불러올 수 있습니다.</p></div><a class="new" href="https://grace-im90.github.io/select-shop-writer/" target="_top">＋ 새 판매글 작성</a></div>
    <section class="summary"><article><span>저장한 판매 상품</span><b id="savedTotal">0개</b></article><article><span>엑셀·Google 상품</span><b id="catalogTotal">0개</b></article></section>
    <section class="panel">
      <div class="tools">
        <div class="tabs"><button id="savedTab" class="on">저장한 판매 상품</button><button id="catalogTab">엑셀·Google 상품</button></div>
        <div class="search"><span>⌕</span><input id="query" placeholder="상품명·브랜드·코드·바코드 검색" autocomplete="off"></div>
      </div>
      <div id="status" class="status">상품 목록을 불러오는 중입니다.</div>
      <div class="tablewrap"><table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table><div id="empty" class="empty hidden"></div></div>
      <div class="pager"><button id="prev">이전</button><span id="pageInfo"></span><button id="next">다음</button></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://grace-im90.github.io/select-shop-writer/cloud.js?v=10"></script>
  <script>
    const $=id=>document.getElementById(id);let saved=[],catalog=[],mode="saved",page=1;const pageSize=50;
    function esc(value){return String(value??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
    function dateText(value){const date=new Date(value);return Number.isNaN(date.getTime())?"-":date.toLocaleDateString("ko-KR")}
    async function loadCatalog(){try{await SelectCloud.ready();const cloud=SelectCloud.user?await SelectCloud.listCatalog():null;catalog=cloud??JSON.parse(localStorage.getItem("select-local-products")||"[]")}catch(e){catalog=[]}$("catalogTotal").textContent=catalog.length.toLocaleString("ko-KR")+"개"}
    async function loadSaved(){try{await SelectCloud.ready();const cloud=SelectCloud.user?await SelectCloud.listSaved():null;saved=cloud??JSON.parse(localStorage.getItem("select-saved-products")||"[]");$("savedTotal").textContent=saved.length.toLocaleString("ko-KR")+"개"}catch(error){saved=[];$("status").textContent=error.message||"저장 상품을 불러오지 못했습니다."}render()}
    function filtered(){const q=$("query").value.toLowerCase().replace(/\s+/g,"");const source=mode==="saved"?saved:catalog;if(!q)return source;return source.filter(p=>Object.values({name:p.name,brand:p.brand,code:p.code,barcode:p.barcode,size:p.size}).join(" ").toLowerCase().replace(/\s+/g,"").includes(q))}
    function openSaved(index){const p=saved[index];if(!p)return;const json=JSON.stringify(p);localStorage.setItem("select-open-saved-product",json);window.top.location.href="https://grace-im90.github.io/select-shop-writer/?saved="+encodeURIComponent(p.id)+"&loaded="+Date.now()+"#savedData="+encodeURIComponent(json)}function openCatalog(index){const p=catalog[index];if(!p)return;const json=JSON.stringify(p);localStorage.setItem("select-open-catalog-product",json);window.top.location.href="https://grace-im90.github.io/select-shop-writer/?loaded="+Date.now()+"#catalogData="+encodeURIComponent(json)}
    async function removeSaved(id,name){if(!confirm(`‘${name}’ 저장 상품을 삭제할까요?`))return;if(SelectCloud.user)await SelectCloud.deleteSaved(id);else{const next=saved.filter(item=>Number(item.id)!==Number(id));localStorage.setItem("select-saved-products",JSON.stringify(next))}await loadSaved()}
    function render(){const rows=filtered();const pages=Math.max(1,Math.ceil(rows.length/pageSize));page=Math.min(page,pages);const view=rows.slice((page-1)*pageSize,page*pageSize);$("savedTab").classList.toggle("on",mode==="saved");$("catalogTab").classList.toggle("on",mode==="catalog");$("status").textContent=mode==="saved"?`저장 상품 ${rows.length.toLocaleString("ko-KR")}개를 표시합니다.`:`현재 브라우저에 불러온 엑셀·Google 상품 ${rows.length.toLocaleString("ko-KR")}개를 표시합니다.`;$("tableHead").innerHTML=mode==="saved"?'<tr><th>번호</th><th>상품명</th><th>종류</th><th>사이즈</th><th>관리 가격</th><th class="hide-mobile">수정일</th><th>관리</th></tr>':'<tr><th>번호</th><th>상품명</th><th>브랜드</th><th>사이즈</th><th class="hide-mobile">상품코드</th><th class="hide-mobile">바코드</th><th>가격</th><th>관리</th></tr>';$("tableBody").innerHTML=view.map((p,i)=>{const n=(page-1)*pageSize+i+1;if(mode==="saved")return`<tr><td class="muted">${n}</td><td class="product-name">${esc([p.brand,p.name].filter(Boolean).join(" "))}</td><td>${esc(p.productType)}</td><td>${esc(p.size)}</td><td class="money">${Number(p.price||0).toLocaleString("ko-KR")}원</td><td class="muted hide-mobile">${dateText(p.updatedAt)}</td><td><div class="actions"><button data-saved-open="${saved.indexOf(p)}">불러오기</button><button class="delete" data-delete="${p.id}" data-name="${esc([p.brand,p.name].filter(Boolean).join(" "))}">삭제</button></div></td></tr>`;const originalIndex=catalog.indexOf(p);return`<tr><td class="muted">${n}</td><td class="product-name">${esc(p.name)}</td><td>${esc(p.brand)}</td><td>${esc(p.size||"-")}</td><td class="muted hide-mobile">${esc(p.code||"-")}</td><td class="muted hide-mobile">${esc(p.barcode||"-")}</td><td class="money">${Number(p.price||0).toLocaleString("ko-KR")}원</td><td><div class="actions"><button data-open="${originalIndex}">작성하기</button></div></td></tr>`}).join("");$("empty").classList.toggle("hidden",view.length>0);$("empty").textContent=mode==="saved"?"저장한 판매 상품이 없습니다.":"작성 페이지에서 엑셀 또는 Google 스프레드시트를 먼저 불러와 주세요.";$("tableBody").closest("table").classList.toggle("hidden",view.length===0);$("pageInfo").textContent=`${page} / ${pages}`;$("prev").disabled=page<=1;$("next").disabled=page>=pages;$("tableBody").querySelectorAll("[data-open]").forEach(button=>button.onclick=()=>openCatalog(Number(button.dataset.open)));$("tableBody").querySelectorAll("[data-saved-open]").forEach(button=>button.onclick=()=>openSaved(Number(button.dataset.savedOpen)));$("tableBody").querySelectorAll("[data-delete]").forEach(button=>button.onclick=()=>removeSaved(Number(button.dataset.delete),button.dataset.name))}
    $("savedTab").onclick=()=>{mode="saved";page=1;render()};$("catalogTab").onclick=()=>{mode="catalog";page=1;render()};$("query").oninput=()=>{page=1;render()};$("prev").onclick=()=>{if(page>1){page--;render()}};$("next").onclick=()=>{page++;render()};async function refreshCloud(){const button=$("cloudSync");if(button){button.disabled=true;button.textContent="새로고침 중…"}try{await loadCatalog();await loadSaved();if(SelectCloud.user)SelectCloud.setStatus(`${SelectCloud.user.email} · 동기화 완료`)}catch(error){SelectCloud.setStatus(error.message||"동기화에 실패했습니다.")}finally{if(button){button.disabled=false;button.textContent="↻ 지금 동기화"}}}$("cloudSync").onclick=refreshCloud;SelectCloud.bindAuth(refreshCloud);refreshCloud();
  </script>
</body>
</html>
