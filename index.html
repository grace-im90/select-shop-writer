    function inferSize(name){const matches=[...name.matchAll(/\(\s*([^)]+?)\s*\)/g)];if(!matches.length)return"";const raw=cleanCell(matches.at(-1)[1]).toUpperCase();if(raw==="F")return"FREE";return /^(XS|S|M|L|XL|2XL|3XL|FREE|\d{2,3})$/.test(raw)?raw:""}
    function inferType(name){const lower=name.toLowerCase();if(/원피스|드레스/.test(lower))return"원피스";if(/팬츠|바지|반바지|쇼츠|슬랙스|트라우저|치노|스커트|데님\s?팬츠/.test(lower))return"하의";if(/자켓|재킷|점퍼|코트|블루종|패딩|야상|ma-?1|윈드|바람막이|후리스\s?집업|트랙탑|베스트|조끼/.test(lower))return"아우터";const numeric=lower.match(/\(\s*(\d{2})\s*\)/)?.[1];if(numeric&&+numeric>=24&&+numeric<=44)return"하의";return"상의"}
    function inferBrand(name){const ignored=new Set(["여성","여자","남성","남자","키즈","빈티지","일본","미국","독일","공식","정품","미군","미해병","아메리칸","오리지널","올드"]);const tokens=name.replace(/^(?:19|20)?\d{2}s?\s+/i,"").replace(/^\d{2}년\s+/,"").trim().split(/\s+/).filter(Boolean);while(tokens.length&&ignored.has(tokens[0]))tokens.shift();return(tokens[0]||"").replace(/\([^)]*\)/g,"").replace(/[,:/]+$/g,"").trim()}
    function rowsToProducts(rows){if(!rows?.length)throw new Error("데이터가 비어 있습니다.");const nameAliases=["메뉴명_한국어","관리메뉴명","상품명","제품명","이름"];let headerIndex=rows.findIndex(row=>row.map(cleanCell).some(cell=>nameAliases.includes(cell)));if(headerIndex<0)throw new Error("상품명 열을 찾지 못했습니다. ‘이름’ 또는 ‘상품명’ 제목을 넣어 주세요.");const headers=rows[headerIndex].map(cleanCell);const findCol=aliases=>aliases.map(name=>headers.indexOf(name)).find(index=>index>=0)??-1;const nameCol=findCol(nameAliases);const codeCol=findCol(["메뉴코드","상품코드","SKU"]);const barcodeCol=findCol(["바코드번호","바코드"]);const priceCol=findCol(["판매가격","판매가","가격"]);return rows.slice(headerIndex+1).map(row=>{const name=cleanCell(row[nameCol]);return{code:codeCol>=0?cleanCell(row[codeCol]):"",barcode:barcodeCol>=0?cleanCell(row[barcodeCol]):"",name,brand:inferBrand(name),size:inferSize(name),type:inferType(name),price:priceCol>=0?Number(row[priceCol]||0):0}}).filter(p=>p.name&&!nameAliases.includes(p.name)&&!p.name.startsWith("📌 구매 전 안내"))}
    function productKey(p){return p.barcode?`barcode:${p.barcode}`:p.code?`code:${p.code}`:`name:${p.name.toLowerCase().replace(/\s+/g,"")}`}
    function getImportMode(){return document.querySelector('input[name="importMode"]:checked')?.value||"replace"}
    function persistProducts(source){try{localStorage.setItem("select-local-products",JSON.stringify(PRODUCTS));localStorage.setItem("select-local-products-source",source);localStorage.setItem("select-local-products-updated",new Date().toISOString())}catch(e){}}
    function resetProductUI(){ $("count").textContent=PRODUCTS.length.toLocaleString("ko-KR")+"개 상품";$("search").value="";$("results").classList.add("hidden");$("picked").classList.add("hidden");$("restoreProducts").classList.toggle("hidden",PRODUCTS===DEFAULT_PRODUCTS)}
    function applyProducts(products,source,mode=getImportMode()){if(!products.length)throw new Error("불러올 상품이 없습니다.");if(mode==="merge"){const map=new Map(PRODUCTS.map(p=>[productKey(p),p]));products.forEach(p=>map.set(productKey(p),p));const before=PRODUCTS.length;PRODUCTS=[...map.values()];$("importStatus").textContent=`${source}: ${products.length.toLocaleString("ko-KR")}개를 반영했습니다. 현재 ${PRODUCTS.length.toLocaleString("ko-KR")}개 (신규 ${Math.max(0,PRODUCTS.length-before).toLocaleString("ko-KR")}개)`}else{PRODUCTS=products;$("importStatus").textContent=`${source}: 기존 목록을 ${PRODUCTS.length.toLocaleString("ko-KR")}개 상품으로 교체했습니다.`}$("importStatus").className="import-status ok";resetProductUI();$("restoreProducts").classList.remove("hidden");persistProducts(source);if(SelectCloud.user)SelectCloud.syncCatalog(PRODUCTS,mode==="replace").then(()=>$("importStatus").textContent+=" · 클라우드 동기화 완료").catch(error=>{$("importStatus").textContent=error.message||"클라우드 동기화에 실패했습니다.";$("importStatus").className="import-status error"})}
    function workbookToProducts(workbook){const sheet=workbook.Sheets[workbook.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:false,defval:""});return rowsToProducts(rows)}
    async function loadExcelFile(file){if(!file)return;setImportStatus("파일을 읽고 있습니다…");try{const data=await file.arrayBuffer();const workbook=XLSX.read(data,{type:"array"});applyProducts(workbookToProducts(workbook),file.name)}catch(error){setImportStatus(error.message||"엑셀 파일을 읽지 못했습니다.",true)}finally{$("excelFile").value=""}}
    function parseGoogleLink(link){const id=link.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/)?.[1];if(!id)throw new Error("올바른 Google 스프레드시트 링크를 입력해 주세요.");const gid=link.match(/[?&#]gid=(\d+)/)?.[1]||"0";return{id,gid}}
    function googleTableToRows(table){if(!table?.cols||!table?.rows)throw new Error("시트 데이터를 찾지 못했습니다.");const headers=table.cols.map(c=>cleanCell(c.label||c.id));return[headers,...table.rows.map(r=>headers.map((_,i)=>{const cell=r.c?.[i];return cell?.f??cell?.v??""}))]}
    function loadGoogleJsonp(link){return new Promise((resolve,reject)=>{const{id,gid}=parseGoogleLink(link);const callback="selectShopSheet_"+Date.now()+"_"+Math.random().toString(36).slice(2);const script=document.createElement("script");const cleanup=()=>{clearTimeout(timer);script.remove();try{delete window[callback]}catch(e){window[callback]=undefined}};window[callback]=response=>{cleanup();if(response?.status==="error")return reject(new Error(response.errors?.[0]?.detailed_message||"Google 시트가 응답하지 않았습니다."));try{resolve(googleTableToRows(response.table))}catch(error){reject(error)}};script.onerror=()=>{cleanup();reject(new Error("Google 시트에 연결하지 못했습니다."))};script.src=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?gid=${encodeURIComponent(gid)}&headers=1&tqx=responseHandler:${callback}`;const timer=setTimeout(()=>{cleanup();reject(new Error("Google 시트 연결 시간이 초과되었습니다."))},15000);document.head.appendChild(script)})}
    async function loadGoogleSheet(){const link=$("googleUrl").value.trim();if(!link)return setImportStatus("Google 스프레드시트 공유 링크를 입력해 주세요.",true);setImportStatus("Google 스프레드시트를 불러오고 있습니다…");try{const rows=await loadGoogleJsonp(link);applyProducts(rowsToProducts(rows),"Google 스프레드시트")}catch(error){setImportStatus((error.message||"불러오지 못했습니다.")+" 공유 설정을 ‘링크가 있는 모든 사용자—뷰어’로 확인해 주세요.",true)}}
    function setImportStatus(message,isError=false){$("importStatus").textContent=message;$("importStatus").className="import-status "+(isError?"error":"")}
    function restoreDefaultProducts(){PRODUCTS=DEFAULT_PRODUCTS;resetProductUI();$("importStatus").textContent="상품 목록을 초기화했습니다. 엑셀 또는 Google 시트를 불러와 주세요.";$("importStatus").className="import-status ok";$("restoreProducts").classList.add("hidden");try{localStorage.removeItem("select-local-products");localStorage.removeItem("select-local-products-source");localStorage.removeItem("select-local-products-updated")}catch(e){}if(SelectCloud.user)SelectCloud.syncCatalog([],true).catch(error=>SelectCloud.setStatus(error.message))}
    function deleteAllProducts(){if(!confirm(`현재 상품 목록 ${PRODUCTS.length.toLocaleString("ko-KR")}개를 모두 삭제할까요?\n삭제 후 새 엑셀 또는 Google 시트를 불러올 수 있습니다.`))return;PRODUCTS=[];resetProductUI();$("importStatus").textContent="상품 목록을 모두 삭제했습니다. 새 엑셀 또는 Google 시트를 불러와 주세요.";$("importStatus").className="import-status ok";$("restoreProducts").classList.remove("hidden");persistProducts("삭제된 목록");if(SelectCloud.user)SelectCloud.syncCatalog([],true).catch(error=>SelectCloud.setStatus(error.message))}
    function resultSearch(){const q=$("search").value.toLowerCase().replace(/\s+/g,"");if(!q){$("results").classList.add("hidden");return}const found=PRODUCTS.filter(p=>(p.name+" "+p.code+" "+p.barcode+" "+p.brand).toLowerCase().replace(/\s+/g,"").includes(q)).slice(0,10);$("results").innerHTML=found.length?found.map((p,i)=>`<button data-i="${PRODUCTS.indexOf(p)}"><span><strong>${escapeHtml(p.name)}</strong><small>${p.code} · ${p.barcode}</small></span><span class="price">${Number(p.price).toLocaleString("ko-KR")}원</span></button>`).join(""):`<div style="padding:20px;text-align:center;color:#8994a4;font-size:11px">검색 결과가 없습니다.</div>`;$("results").classList.remove("hidden");$("results").querySelectorAll("button").forEach(b=>b.onclick=()=>pick(PRODUCTS[+b.dataset.i]))}
    function nameAutocomplete(){const q=$("name").value.toLowerCase().replace(/\s+/g,"");if(!q){$("nameResults").classList.add("hidden");return}const found=PRODUCTS.filter(p=>(p.name+" "+p.brand).toLowerCase().replace(/\s+/g,"").includes(q)).slice(0,8);$("nameResults").innerHTML=found.length?found.map(p=>`<button type="button" data-i="${PRODUCTS.indexOf(p)}"><strong>${escapeHtml(p.name)}</strong><span>${escapeHtml(p.size||"")} · ${Number(p.price||0).toLocaleString("ko-KR")}원</span></button>`).join(""):'<div style="padding:13px;text-align:center;color:#8994a4;font-size:10px">일치하는 상품이 없습니다.</div>';$("nameResults").classList.remove("hidden");$("nameResults").querySelectorAll("button").forEach(button=>button.onclick=()=>pick(PRODUCTS[Number(button.dataset.i)]))}
    function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
    function setSaveStatus(message,isError=false){$("saveStatus").textContent=message;$("saveStatus").className="save-status"+(isError?" error":"")}
    function applySavedProduct(p){savedId=p.id;$("brand").value=p.brand||"";$("name").value=p.name||"";$("price").value=p.price||"";$("desc").value=p.description||"";$("condition").value=p.condition||"B+ 좋은 상태";setSizes(p.size||"표기 없음");measurements=p.measurements||{};setType(p.productType||"상의");$("saveProduct").textContent="✓ 저장된 상품 수정";setSaveStatus("상품 목차에서 저장 상품을 불러왔습니다. 수정 후 다시 저장할 수 있습니다.")}
    function readSavedProducts(){try{return JSON.parse(localStorage.getItem("select-saved-products")||"[]")}catch(e){return[]}}
    function writeSavedProducts(products){localStorage.setItem("select-saved-products",JSON.stringify(products))}
    async function loadSavedById(id){try{await SelectCloud.ready();const product=SelectCloud.user?await SelectCloud.getSaved(id):readSavedProducts().find(item=>Number(item.id)===Number(id));if(!product)throw new Error("저장 상품을 찾지 못했습니다.");applySavedProduct(product)}catch(error){setSaveStatus(error.message||"저장 상품을 불러오지 못했습니다.",true)}}
    async function saveCurrentProduct(){const name=$("name").value.trim();if(!name){setSaveStatus("상품명을 입력해 주세요.",true);$("name").focus();return}const button=$("saveProduct");button.disabled=true;button.textContent="저장 중…";setSaveStatus("");try{const products=readSavedProducts();const now=new Date().toISOString();const existingIndex=products.findIndex(item=>Number(item.id)===Number(savedId));const existing=existingIndex>=0?products[existingIndex]:null;let product={id:existing?.id||savedId||Date.now(),brand:$("brand").value.trim(),name,productType:type,size:$("size").value,condition:$("condition").value,price:Number($("price").value)||0,description:$("desc").value.trim(),measurements,createdAt:existing?.createdAt||now,updatedAt:now};if(SelectCloud.user){product=await SelectCloud.saveSaved(product)}else{if(existingIndex>=0)products[existingIndex]=product;else products.unshift(product);writeSavedProducts(products)}savedId=product.id;button.classList.add("done");button.textContent="✓ 저장 완료";setSaveStatus(SelectCloud.user?"클라우드에 저장했습니다. PC와 휴대폰에서 확인할 수 있습니다.":"현재 브라우저에 저장했습니다. 클라우드 동기화는 로그인 후 사용할 수 있습니다.");setTimeout(()=>{button.classList.remove("done");button.textContent="✓ 저장된 상품 수정";button.disabled=false},1200)}catch(error){button.disabled=false;button.textContent=savedId?"✓ 저장된 상품 수정":"＋ 상품 저장";setSaveStatus(error.message||"상품을 저장하지 못했습니다.",true)}}
    function pick(p){savedId=null;$("saveProduct").textContent="＋ 상품 저장";$("search").value=p.name;$("results").classList.add("hidden");$("nameResults").classList.add("hidden");$("picked").innerHTML=`<b>선택됨</b> · ${escapeHtml(p.name)} · ${Number(p.price).toLocaleString("ko-KR")}원`;$("picked").classList.remove("hidden");$("brand").value=p.brand;setSizes(p.size||"표기 없음");$("name").value=p.brand&&p.name.startsWith(p.brand)?p.name.slice(p.brand.length).trim():p.name;$("price").value=p.price||"";measurements={};setType(p.type)}
    function getText(){const m=FIELDS[type].filter(([k])=>measurements[k]).map(([k,l])=>`${l} ${measurements[k]}cm`).join(" / ");const title=[$("brand").value.trim(),$("name").value.trim()].filter(Boolean).join(" ")||"상품명을 입력해 주세요";return [title,"",`브랜드 : ${$("brand").value.trim()||"-"}`,`표기 사이즈 : ${$("size").value}`,`컨디션 : ${$("condition").value}`,`실측(cm) : ${m||"-"}`,"",$("desc").value.trim()||"상품 설명을 입력해 주세요.","",$("notice").value.trim()].join("\n")}
    function render(){const m=FIELDS[type].filter(([k])=>measurements[k]).map(([k,l])=>`${l} ${measurements[k]}cm`).join(" / ");$("viewTitle").textContent=[$("brand").value.trim(),$("name").value.trim()].filter(Boolean).join(" ")||"상품명을 입력해 주세요";$("meta").innerHTML=`<p><span>브랜드</span>${escapeHtml($("brand").value.trim()||"-")}</p><p><span>표기 사이즈</span>${escapeHtml($("size").value)}</p><p><span>컨디션</span>${escapeHtml($("condition").value)}</p><p><span>관리 가격</span>${Number($("price").value||0).toLocaleString("ko-KR")}원 <small style="color:#9aa4b2">(복사 제외)</small></p><p><span>실측</span>${escapeHtml(m||"-")}</p>`;$("viewDesc").textContent=$("desc").value.trim()||"상품 설명을 입력해 주세요.";$("viewNotice").textContent=$("notice").value;try{localStorage.setItem("select-local-notice",$("notice").value)}catch(e){}}
    async function copyAll(){const text=getText();let ok=false;try{await navigator.clipboard.writeText(text);ok=true}catch(e){const t=document.createElement("textarea");t.value=text;t.style.position="fixed";t.style.opacity="0";document.body.appendChild(t);t.focus();t.select();try{ok=document.execCommand("copy")}catch(_){}t.remove()}if(!ok){prompt("아래 내용을 전체 선택해서 복사해 주세요.",text);return}$("copy").classList.add("done");$("copy").textContent="✓ 복사 완료";setTimeout(()=>{$("copy").classList.remove("done");$("copy").textContent="▣ 판매글 전체 복사"},1400)}
    function resetForm(){savedId=null;$("search").value="";$("picked").classList.add("hidden");$("brand").value="";$("name").value="";$("price").value="";$("desc").value="";$("condition").value="B+ 좋은 상태";$("saveProduct").textContent="＋ 상품 저장";setSaveStatus("");setSizes();measurements={};setType("상의")}
    try{const savedProducts=localStorage.getItem("select-local-products");if(savedProducts!==null){PRODUCTS=JSON.parse(savedProducts);$("importStatus").textContent=(localStorage.getItem("select-local-products-source")||"저장된 파일")+" · "+PRODUCTS.length.toLocaleString("ko-KR")+"개 상품을 사용 중입니다.";$("importStatus").className="import-status ok";$("restoreProducts").classList.remove("hidden")}}catch(e){}$("excelFile").onchange=e=>loadExcelFile(e.target.files[0]);$("googleLoad").onclick=loadGoogleSheet;$("restoreProducts").onclick=restoreDefaultProducts;$("deleteProducts").onclick=deleteAllProducts;$("saveProduct").onclick=saveCurrentProduct;$("count").textContent=PRODUCTS.length.toLocaleString("ko-KR")+"개 상품";setSizes();setType("상의");try{$("notice").value=localStorage.getItem("select-local-notice")||DEFAULT_NOTICE}catch(e){$("notice").value=DEFAULT_NOTICE}SelectCloud.bindAuth(async user=>{if(!user)return;try{const localSaved=readSavedProducts();for(const item of localSaved)await SelectCloud.saveSaved({...item,id:null});if(localSaved.length)localStorage.removeItem("select-saved-products");const cloudProducts=await SelectCloud.listCatalog();if(cloudProducts?.length){PRODUCTS=cloudProducts;persistProducts("클라우드 상품 목록");resetProductUI();$("importStatus").textContent=`클라우드에서 ${PRODUCTS.length.toLocaleString("ko-KR")}개 상품을 불러왔습니다.`;$("importStatus").className="import-status ok"}else if(PRODUCTS.length){await SelectCloud.syncCatalog(PRODUCTS,false);$("importStatus").textContent+=" · 클라우드에 동기화했습니다."}}catch(error){SelectCloud.setStatus(error.message||"클라우드 데이터를 불러오지 못했습니다.")}})
    ["brand","name","size","condition","price","desc","notice"].forEach(id=>$(id).addEventListener("input",render));$("name").addEventListener("input",nameAutocomplete);$("name").addEventListener("focus",nameAutocomplete);$("search").oninput=resultSearch;$("search").onfocus=resultSearch;document.addEventListener("click",e=>{if(!e.target.closest(".searchbox"))$("results").classList.add("hidden");if(!e.target.closest(".name-wrap"))$("nameResults").classList.add("hidden")});$("copy").onclick=copyAll;$("reset").onclick=resetForm;try{const deepId=Number(new URLSearchParams(window.parent.location.search).get("saved"));if(Number.isInteger(deepId)&&deepId>0){loadSavedById(deepId)}else{const openProduct=JSON.parse(localStorage.getItem("select-open-catalog-product")||"null");if(openProduct){localStorage.removeItem("select-open-catalog-product");pick(openProduct);setSaveStatus("상품 목차에서 엑셀·Google 상품을 불러왔습니다.")}}}catch(e){}
    function tab(preview){$("editor").classList.toggle("hide",preview);$("preview").classList.toggle("show",preview);$("editTab").classList.toggle("on",!preview);$("previewTab").classList.toggle("on",preview)}$("editTab").onclick=()=>tab(false);$("previewTab").onclick=()=>tab(true);render();
  </script>
